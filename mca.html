<script>

/* SECTION SWITCH */
function showSection(id,el){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".sidebar a").forEach(a=>a.classList.remove("active"))
el.classList.add("active")
}

/* LOGOUT */
function logout(){
if(confirm("Logout?")) window.location="logout.php"
}

/* RANDOM WORD */
const words=["Hello","Morning","Practice","Language","Assistant","Opportunity"]
function randomWord(){
let word=words[Math.floor(Math.random()*words.length)]
document.getElementById("expectedWord").value=word
}

/* SIMILARITY SCORE */
function similarity(a,b){
a=a.toLowerCase()
b=b.toLowerCase()
let match=0
for(let i=0;i<b.length;i++){
if(a[i]==b[i]) match++
}
return Math.floor(match/b.length*100)
}

/* SPEECH PRACTICE */
function startSpeech(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.lang=document.getElementById("language").value

recognition.onresult=function(e){
let spoken=e.results[0][0].transcript
document.getElementById("result").innerHTML="You said: "+spoken

let expected=document.getElementById("expectedWord").value
if(expected){
let score=similarity(spoken,expected)
document.getElementById("score").innerHTML="Accuracy: "+score+"%"
updateStats(score)
}
}

recognition.start()
}

/* SPEAK */
function speak(){
let text=document.getElementById("expectedWord").value
let speech=new SpeechSynthesisUtterance(text)
speech.lang=document.getElementById("language").value
speechSynthesis.speak(speech)
}

/* LESSON */
const lessons=[
"Hello how are you",
"I am learning English",
"Practice makes perfect"
]

let currentLesson=""

function startLesson(){
currentLesson=lessons[Math.floor(Math.random()*lessons.length)]
document.getElementById("lessonSentence").innerHTML=currentLesson
speechSynthesis.speak(new SpeechSynthesisUtterance(currentLesson))
}

function repeatLesson(){
speechSynthesis.speak(new SpeechSynthesisUtterance(currentLesson))
}

/* CONVERSATION */
function startConversation(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.onresult=function(e){
let text=e.results[0][0].transcript
let chat=document.getElementById("chat")

chat.innerHTML+=`<div class="chat-user">You: ${text}</div>`

let reply="Nice talking with you!"
chat.innerHTML+=`<div class="chat-ai">AI: ${reply}</div>`

speechSynthesis.speak(new SpeechSynthesisUtterance(reply))
}
recognition.start()
}

/* EXAM */
let examSentence=""

function startExam(){
examSentence="Good morning"
document.getElementById("examSentence").innerHTML="Say: "+examSentence
speechSynthesis.speak(new SpeechSynthesisUtterance(examSentence))
}

function answerExam(){
const recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.onresult=function(e){
let spoken=e.results[0][0].transcript
let score=similarity(spoken,examSentence)
document.getElementById("examScore").innerHTML="Score: "+score+"%"
updateStats(score)
}
recognition.start()
}

/* DICTIONARY */
function searchWord(){
let word=document.getElementById("word").value
fetch("https://api.dictionaryapi.dev/api/v2/entries/en/"+word)
.then(res=>res.json())
.then(data=>{
if(data.title){
document.getElementById("meaning").innerHTML="Word not found"
}else{
document.getElementById("meaning").innerHTML=data[0].meanings[0].definitions[0].definition
}
})
}

function speakWord(){
let word=document.getElementById("word").value
speechSynthesis.speak(new SpeechSynthesisUtterance(word))
}

/* STATS */
let total=0
let scores=[]

function updateStats(score){
total++
scores.push(score)

document.getElementById("totalPractice").innerText=total

let avg=Math.floor(scores.reduce((a,b)=>a+b)/scores.length)
document.getElementById("avgScore").innerText=avg+"%"

let streak=parseInt(localStorage.getItem("streak")||0)+1
localStorage.setItem("streak",streak)
document.getElementById("streak").innerText=streak
}

/* CHART */
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri"],
datasets:[{
label:"Practice Score",
data:[60,70,80,75,90],
borderColor:"#ff6b3d",
borderWidth:3
}]
}
})
